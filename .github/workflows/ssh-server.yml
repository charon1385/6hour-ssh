name: Web Terminal

on:
  workflow_dispatch:

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Setup Web Terminal
        run: |
          # Install gotty
          wget https://github.com/yudai/gotty/releases/download/v1.0.1/gotty_linux_amd64.tar.gz
          tar -xf gotty_linux_amd64.tar.gz
          
          # Run terminal on port 8080
          ./gotty -w bash &
          
      - name: Expose with localtunnel
        run: |
          npm install -g localtunnel
          lt --port 8080
